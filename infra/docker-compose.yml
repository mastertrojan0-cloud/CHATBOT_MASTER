services:
  postgres:
    image: postgres:15-alpine
    container_name: flowdesk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowdesk_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-flowdesk_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdesk -d flowdesk_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  waha:
    build:
      context: ..
      dockerfile: infra/waha.Dockerfile
    container_name: flowdesk-waha
    environment:
      WHATSAPP_API_KEY: ${WAHA_TOKEN:-flowdesk-waha-token-2024}
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: flowdesk2024
    ports:
      - "3000:3000"

volumes:
  postgres_data:
