version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowdesk-postgres
    environment:
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk123
      POSTGRES_DB: flowdesk_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdesk -d flowdesk_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: