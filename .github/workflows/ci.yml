name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: npx prisma generate --schema packages/db/prisma/schema.prisma
      - run: yarn workspace @flowdesk/db build
      - run: yarn workspace @flowdesk/shared build
      - run: yarn workspace @flowdesk/engine build
      - run: yarn workspace @flowdesk/api typecheck
      - run: yarn workspace @flowdesk/dashboard typecheck
      - run: yarn workspace @flowdesk/api build
      - run: yarn workspace @flowdesk/dashboard build

  deploy-api:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service flowdesk-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Verify Railway Health
        run: |
          curl --fail --silent --show-error https://flowdesk-api-production-e03a.up.railway.app/health
          curl --fail --silent --show-error https://flowdesk-api-production-e03a.up.railway.app/api/health
