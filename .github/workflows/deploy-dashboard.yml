name: Deploy Dashboard
on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

concurrency:
  group: dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @flowdesk/dashboard build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/dashboard
          vercel-args: '--prod'
      - name: Verify Dashboard
        run: |
          curl --fail --silent --show-error https://chatbot-master-dashboard.vercel.app/
          curl --fail --silent --show-error https://chatbot-master-dashboard.vercel.app/connect
